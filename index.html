<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legião do Caos RP | MadOut2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #030303;
            --card-bg: #0b0b0b;
            --text-light: #f0f0f0;
            --accent-gray: #151515;
            --transition-fast: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--dark-bg); 
            color: var(--text-light); 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary-red); border-radius: 10px; }

        /* Header */
        header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.95);
            border-bottom: 2px solid var(--primary-red);
            position: fixed;
            width: 100%;
            top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-text { 
            font-weight: 900; 
            color: var(--primary-red); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-style: italic;
            font-size: 1.2rem;
        }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a {
            color: white; text-decoration: none; font-weight: 700; font-size: 0.8rem;
            text-transform: uppercase; transition: var(--transition-fast);
        }
        nav a:hover { color: var(--primary-red); }

        .menu-toggle { display: none; color: white; font-size: 1.5rem; cursor: pointer; }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(0deg, var(--dark-bg) 5%, rgba(0,0,0,0.6) 100%), 
                        url('https://images.unsplash.com/photo-1514473776127-61e2dc1dded3?q=80') center/cover no-repeat;
            padding: 100px 20px 40px 20px;
        }

        .hero img {
            width: clamp(150px, 30vw, 220px);
            height: clamp(150px, 30vw, 220px);
            border-radius: 50%;
            border: 4px solid var(--primary-red);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            margin-bottom: 20px;
            object-fit: cover;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 0, 0, 0.6); }
        }

        .hero h1 { 
            font-size: clamp(1.8rem, 8vw, 4rem); 
            text-transform: uppercase; font-weight: 900;
            color: white; line-height: 1.1; margin-bottom: 10px;
        }

        .btn-join {
            background: var(--primary-red); color: white; padding: 12px 25px;
            border-radius: 4px; text-decoration: none; font-weight: 900;
            font-size: 1rem; transition: 0.3s; margin-top: 25px;
            display: inline-flex; align-items: center; gap: 10px;
            text-transform: uppercase;
        }

        /* Seções */
        section { padding: 80px 5%; }
        .section-title { text-align: center; margin-bottom: 40px; }
        h2 { font-size: clamp(1.5rem, 5vw, 2.5rem); text-transform: uppercase; color: var(--primary-red); font-weight: 900; }
        .underline { width: 50px; height: 4px; background: var(--primary-red); margin: 10px auto; }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .member-card {
            background: var(--card-bg); padding: 25px 15px; text-align: center;
            border: 1px solid var(--accent-gray); border-radius: 8px;
        }

        /* Galeria 20 Fotos */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .gallery-item { 
            aspect-ratio: 16/9; 
            overflow: hidden; 
            border: 2px solid #1a1a1a; 
            border-radius: 8px;
            background: #111;
        }
        .gallery-item img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0.8; 
            transition: 0.5s ease;
            filter: grayscale(50%);
        }
        .gallery-item:hover img { opacity: 1; transform: scale(1.08); filter: grayscale(0%); }

        footer { padding: 40px 20px; text-align: center; background: #000; border-top: 1px solid var(--accent-gray); }

        /* Mobile */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav ul {
                display: none; flex-direction: column; position: absolute;
                top: 60px; left: 0; width: 100%; background: rgba(0,0,0,0.98);
                padding: 20px; border-bottom: 2px solid var(--primary-red);
            }
            nav ul.active { display: flex; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            section { padding: 50px 5%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Legião do Caos</div>
        <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
        <nav>
            <ul id="nav-list">
                <li><a href="#membros">ELITE</a></li>
                <li><a href="#galeria">FROTA</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="logo.png" alt="Logo" data-aos="zoom-in" onerror="this.src='https://via.placeholder.com/200/ff0000/ffffff?text=LOGO'">
            <h1 data-aos="fade-up">CAOS E ORDEM</h1>
            <p data-aos="fade-up" data-aos-delay="200">A força bruta que comanda o MadOut2.</p>
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank" class="btn-join">
                <i class="fab fa-whatsapp"></i> FECHAR COM A GANGUE
            </a>
        </section>

        <section id="membros">
            <div class="section-title" data-aos="fade-up">
                <h2>Hierarquia de Elite</h2>
                <div class="underline"></div>
            </div>
            <div class="members-grid">
                <div class="member-card" data-aos="fade-up">
                    <i class="fas fa-crown"></i>
                    <div style="color:red; font-size:12px; font-weight:bold">LÍDER</div>
                    <h3>Caua Madout2</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-skull"></i>
                    <div style="color:red; font-size:12px; font-weight:bold">CAPITÃO</div>
                    <h3>Reginaldo Brandão</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="200">
                    <i class="fas fa-user-shield"></i>
                    <div style="color:red; font-size:12px; font-weight:bold">CONSELHEIRO</div>
                    <h3>Daniel Araujox</h3>
                </div>
            </div>
        </section>

        <section id="galeria" style="background: #020202;">
            <div class="section-title" data-aos="fade-up">
                <h2>Nossa Frota (20 Fotos)</h2>
                <div class="underline"></div>
            </div>
            <div class="gallery" id="image-gallery">
                </div>
        </section>
    </main>

    <footer>
        <p style="font-weight:900">LEGIÃO DO CAOS RP</p>
        <div class="social-icons" style="margin-top:15px">
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank" style="color:white; margin:0 10px; font-size: 1.5rem;"><i class="fab fa-whatsapp"></i></a>
            <a href="#" style="color:white; margin:0 10px; font-size: 1.5rem;"><i class="fab fa-discord"></i></a>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // LISTA DAS 20 FOTOS - Certifique-se que os nomes estão idênticos no GitHub
        const fotos = [
            'image_b6818d.jpg', 'image_b684d2.jpg', 'image_b6e347.jpg', 
            'image_b6e66b.png', 'image_b6e762.png', 'image_b753a4.jpg',
            'image_b753c4.jpg', 'image_b753e0.jpg', 'image_b753fe.jpg',
            'image_b7541b.jpg', 'image_b75424.jpg', 'image_b756e4.jpg',
            'image_b756ea.jpg', 'image_b75706.jpg', 'image_b75724.jpg',
            // Adicione os nomes das 5 fotos restantes aqui:
            'foto16.jpg', 'foto17.jpg', 'foto18.jpg', 'foto19.jpg', 'foto20.jpg'
        ];

        const galleryContainer = document.getElementById('image-gallery');
        
        fotos.forEach(nomeArquivo => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.setAttribute('data-aos', 'zoom-in');
            
            // O onerror coloca uma imagem cinza caso o nome do arquivo esteja errado no GitHub
            div.innerHTML = `
                <img src="${nomeArquivo}" 
                     alt="Veículo Legião" 
                     loading="lazy" 
                     onerror="this.src='https://via.placeholder.com/400x225/111/333?text=Erro:+Nome+do+Arquivo'">`;
            
            galleryContainer.appendChild(div);
        });

        // Menu Mobile
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        menuToggle.onclick = () => navList.classList.toggle('active');
    </script>
</body>
</html>
