<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legião do Caos RP | Elite MadOut2</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.5);
            --dark: #050505;
            --glass: rgba(15, 15, 15, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        /* Base & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--dark); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Background Glow */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255,0,0,0.03) 0%, transparent 60%); z-index: -1; pointer-events: none; }

        /* Equalizer/Audio Player */
        .audio-player {
            position: fixed; bottom: 30px; left: 30px; z-index: 2000;
            display: flex; align-items: center; gap: 15px;
            background: var(--glass); padding: 12px 20px; border-radius: 50px;
            border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
            cursor: pointer; transition: 0.3s;
        }
        .audio-player:hover { border-color: var(--primary); transform: scale(1.05); }
        
        .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 15px; }
        .bar { width: 3px; background: var(--primary); border-radius: 1px; }
        .bar.animating { animation: eq 0.8s ease-in-out infinite alternate; }
        
        @keyframes eq { 
            0% { height: 3px; } 
            100% { height: 15px; } 
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }

        header {
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            position: fixed; width: 100%; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        .logo-text { font-family: 'Syncopate', sans-serif; letter-spacing: 5px; font-size: 0.9rem; font-weight: 700; }
        .logo-text span { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        nav a {
            color: var(--text-main); text-decoration: none; font-size: 0.65rem; letter-spacing: 2px;
            font-weight: 700; padding: 10px 20px; border: 1px solid var(--border-glass);
            border-radius: 2px; transition: 0.3s; background: var(--glass);
        }
        nav a:hover { background: var(--primary); border-color: var(--primary); }

        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1493238792040-815412217bb2?q=80') center/cover;
        }

        .hero img {
            width: clamp(150px, 35vw, 220px); border-radius: 50%; border: 2px solid var(--primary);
            padding: 8px; margin-bottom: 25px; filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(1.8rem, 7vw, 4rem); letter-spacing: -2px; margin-bottom: 10px; }
        .hero p { color: var(--text-dim); letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 30px; }

        .btn-modern {
            background: var(--primary); color: white; padding: 18px 45px;
            text-decoration: none; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; border-radius: 2px; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

        .section-padding { padding: 100px 8%; }
        .section-title { margin-bottom: 50px; border-left: 3px solid var(--primary); padding-left: 20px; }
        .section-title h2 { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; }

        .members-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .member-card { background: var(--glass); border: 1px solid var(--border-glass); padding: 40px 20px; text-align: center; transition: 0.3s; }
        .member-card:hover { border-color: var(--primary); background: #111; transform: translateY(-5px); }
        .member-card i { font-size: 2rem; color: var(--primary); margin-bottom: 15px; }

        .rules-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .rule-item { display: flex; gap: 20px; background: rgba(255,255,255,0.02); padding: 25px; border-radius: 4px; border: 1px solid transparent; transition: 0.3s; }
        .rule-item:hover { border-color: var(--border-glass); background: rgba(255,255,255,0.04); }
        .rule-item i { color: var(--primary); font-size: 1.2rem; }

        footer { padding: 60px 8%; background: #000; text-align: center; border-top: 1px solid var(--border-glass); }
        .socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .socials a { color: var(--text-dim); font-size: 1.2rem; transition: 0.3s; }
        .socials a:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .section-padding { padding: 60px 5%; }
            .members-grid { grid-template-columns: 1fr 1fr; }
            .audio-player { bottom: 20px; left: 20px; padding: 10px 15px; scale: 0.8; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <span id="audioStatus" style="font-size: 0.6rem; font-weight: 900; letter-spacing: 1px;">SOM OFF</span>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
        </audio>
    </div>

    <header>
        <div class="logo-text">LEGIÃO<span>CAOS</span></div>
        <nav><a href="#regras">REGRAS</a></nav>
    </header>

    <main>
        <section class="hero">
            <img src="logo.png" alt="Logo" data-aos="zoom-in" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2523/2523363.png'">
            <h1 data-aos="fade-up">LEGIÃO DO CAOS</h1>
            <p data-aos="fade-up" data-aos-delay="200">Dominando o Asfalto</p>
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank" class="btn-modern" data-aos="fade-up" data-aos-delay="400">JUNTAR-SE À GANGUE</a>
        </section>

        <section class="section-padding" id="membros">
            <div class="section-title" data-aos="fade-right">
                <p style="color:var(--primary); font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">ESTRUTURA</p>
                <h2>Hierarquia</h2>
            </div>
            <div class="members-grid">
                <div class="member-card" data-aos="fade-up">
                    <i class="fas fa-crown"></i>
                    <h3 style="font-size: 0.9rem; text-transform: uppercase;">Caua</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-skull"></i>
                    <h3 style="font-size: 0.9rem; text-transform: uppercase;">Reginaldo</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="200">
                    <i class="fas fa-user-shield"></i>
                    <h3 style="font-size: 0.9rem; text-transform: uppercase;">Daniel</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="300">
                    <i class="fas fa-crosshairs"></i>
                    <h3 style="font-size: 0.9rem; text-transform: uppercase;">[ 01 ]</h3>
                </div>
            </div>
        </section>

        <section class="section-padding" id="regras" style="background: #080808;">
            <div class="section-title" data-aos="fade-right">
                <p style="color:var(--primary); font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">HONRA</p>
                <h2>Regras</h2>
            </div>
            <div class="rules-container">
                <div class="rule-item" data-aos="fade-up">
                    <i class="fas fa-fist-raised"></i>
                    <div>
                        <h4 style="font-size: 0.8rem; margin-bottom: 5px;">Hierarquia</h4>
                        <p style="font-size: 0.8rem; color: #666;">Respeito total aos comandos superiores.</p>
                    </div>
                </div>
                <div class="rule-item" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-handshake-slash"></i>
                    <div>
                        <h4 style="font-size: 0.8rem; margin-bottom: 5px;">Lealdade</h4>
                        <p style="font-size: 0.8rem; color: #666;">Traição é punida com banimento.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="socials">
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
        </div>
        <p class="copy">Legião do Caos RP &copy; 2026</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Lógica do Player de Áudio
        const audio = document.getElementById('bgMusic');
        const audioToggle = document.getElementById('audioToggle');
        const statusText = document.getElementById('audioStatus');
        const bars = document.querySelectorAll('.bar');

        audioToggle.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                statusText.innerText = "SOM ON";
                bars.forEach(bar => bar.classList.add('animating'));
            } else {
                audio.pause();
                statusText.innerText = "SOM OFF";
                bars.forEach(bar => bar.classList.remove('animating'));
            }
        });
    </script>
</body>
</html>
