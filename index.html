<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legião do Caos RP | MadOut2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #030303;
            --card-bg: #0b0b0b;
            --text-light: #f0f0f0;
            --accent-gray: #151515;
            --transition-fast: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--dark-bg); 
            color: var(--text-light); 
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Header Responsivo */
        header {
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.95);
            border-bottom: 2px solid var(--primary-red);
            position: fixed;
            width: 100%;
            top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-text { 
            font-weight: 900; 
            color: var(--primary-red); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-style: italic;
            font-size: 1.1rem;
        }

        header nav a {
            color: white; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        header nav a:hover { border-color: var(--primary-red); color: var(--primary-red); }

        /* Hero Ajustado para Mobile */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(0deg, var(--dark-bg) 10%, rgba(0,0,0,0.5) 100%), 
                        url('https://images.unsplash.com/photo-1514473776127-61e2dc1dded3?q=80') center/cover no-repeat;
            padding: 80px 20px 40px 20px;
        }

        .hero img {
            width: clamp(160px, 50vw, 240px);
            height: auto;
            border-radius: 50%;
            border: 4px solid var(--primary-red);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hero h1 { 
            font-size: clamp(1.8rem, 10vw, 4rem); 
            text-transform: uppercase; font-weight: 900;
            color: white; line-height: 1.1;
        }

        .btn-join {
            background: var(--primary-red); 
            color: white; 
            padding: 15px 30px;
            border-radius: 4px; 
            text-decoration: none; 
            font-weight: 900;
            font-size: 1rem; 
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            width: fit-content;
        }

        /* Grid de Membros Responsivo */
        section { padding: 60px 5%; }
        
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* Melhora em telas pequenas */
            gap: 15px;
        }

        .member-card {
            background: var(--card-bg);
            padding: 20px 10px;
            text-align: center;
            border: 1px solid var(--accent-gray);
            border-radius: 8px;
        }

        .member-card i { font-size: 1.8rem; color: var(--primary-red); margin-bottom: 10px; }
        .rank { font-size: 0.65rem; color: var(--primary-red); font-weight: bold; margin-bottom: 5px; }
        .member-card h3 { font-size: 1rem; color: white; }

        footer { padding: 40px 20px; text-align: center; background: #000; border-top: 1px solid var(--accent-gray); }

        /* AJUSTES FINAIS MOBILE */
        @media (max-width: 480px) {
            .hero h1 { font-size: 2.2rem; }
            .hero p { font-size: 1rem; }
            .members-grid { grid-template-columns: 1fr 1fr; } /* Dois por linha no celular */
            .logo-text { letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Legião do Caos</div>
        <nav>
            <a href="#membros">ELITE</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="logo.png" alt="Logo" data-aos="zoom-in" onerror="this.src='https://via.placeholder.com/200/ff0000/ffffff?text=LOGO'">
            <h1 data-aos="fade-up">CAOS E ORDEM</h1>
            <p data-aos="fade-up" data-aos-delay="200">A força bruta que comanda o MadOut2.</p>
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank" class="btn-join">
                <i class="fab fa-whatsapp"></i> GANGUE
            </a>
        </section>

        <section id="membros">
            <div style="text-align:center; margin-bottom: 40px;">
                <h2 style="color:var(--primary-red); text-transform:uppercase; font-weight:900;">Hierarquia</h2>
                <div style="width:50px; height:3px; background:var(--primary-red); margin:10px auto;"></div>
            </div>
            <div class="members-grid">
                <div class="member-card" data-aos="fade-up">
                    <i class="fas fa-crown"></i>
                    <div class="rank">Fundador</div>
                    <h3>Caua</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-skull"></i>
                    <div class="rank">Capitão</div>
                    <h3>Reginaldo</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="200">
                    <i class="fas fa-user-shield"></i>
                    <div class="rank">Conselheiro</div>
                    <h3>Daniel</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="300">
                    <i class="fas fa-crosshairs"></i>
                    <div class="rank">Operacional</div>
                    <h3>[ 01 ]</h3>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p style="font-weight: 900; font-size: 0.9rem;">LEGIÃO DO CAOS RP</p>
        <div style="margin-top:15px; display:flex; justify-content:center; gap:20px;">
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" style="color:white;"><i class="fab fa-whatsapp"></i></a>
            <a href="#" style="color:white;"><i class="fab fa-discord"></i></a>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
