<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legião do Caos RP | MadOut2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #030303;
            --card-bg: #0b0b0b;
            --text-light: #f0f0f0;
            --accent-gray: #151515;
            --transition-fast: 0.3s ease;
        }

        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--dark-bg); 
            color: var(--text-light); 
            overflow-x: hidden;
            font-size: 16px;
        }

        /* Scrollbar Profissional */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary-red); border-radius: 10px; }

        /* Header Animado */
        header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--primary-red);
            position: fixed;
            width: 100%;
            top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
            transition: background var(--transition-fast);
        }

        .logo-text { 
            font-weight: 900; 
            color: var(--primary-red); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-style: italic;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        header nav a {
            color: white; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.8rem;
            margin-left: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            transition: var(--transition-fast);
        }

        header nav a::after {
            content: '';
            position: absolute;
            width: 0; height: 2px;
            bottom: -5px; left: 0;
            background-color: var(--primary-red);
            transition: var(--transition-fast);
        }

        header nav a:hover::after { width: 100%; }
        header nav a:hover { color: var(--primary-red); }

        /* Hero Section com Paralaxe e Animação de Brilho */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Novo Fundo Urbano e Escuro */
            background: linear-gradient(0deg, var(--dark-bg) 5%, rgba(0,0,0,0.5) 100%), 
                        url('https://images.unsplash.com/photo-1514473776127-61e2dc1dded3?q=80') center/cover;
            background-attachment: fixed; /* Efeito Paralaxe */
            padding: 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.05) 0%, transparent 80%);
            z-index: 1;
        }

        .hero * { z-index: 2; position: relative; }

        .hero img {
            width: 250px; 
            height: 250px;
            border-radius: 50%;
            border: 5px solid var(--primary-red);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
            margin-bottom: 30px;
            object-fit: cover;
            animation: pulse 2s infinite, float 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
            50% { transform: scale(1.03); box-shadow: 0 0 70px rgba(255, 0, 0, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero h1 { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            text-transform: uppercase; 
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            letter-spacing: -2px;
            margin-bottom: 10px;
            color: white;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 10px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .btn-join {
            background: var(--primary-red); 
            color: white; 
            padding: 20px 50px;
            border-radius: 5px; 
            text-decoration: none; 
            font-weight: 900;
            font-size: 1.3rem; 
            transition: var(--transition-fast); 
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
            cursor: pointer;
            border: 2px solid transparent;
        }

        .btn-join:hover {
            background: transparent;
            color: var(--primary-red);
            transform: scale(1.05);
            border: 2px solid var(--primary-red);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.7);
        }

        /* Seções e Animações no Scroll */
        section { padding: 120px 10%; position: relative; }

        .section-title-container { 
            text-align: center; 
            width: 100%; 
            margin-bottom: 70px;
            overflow: hidden;
        }

        h2 { 
            text-align: center; 
            font-size: clamp(2rem, 5vw, 3rem); 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            color: var(--primary-red); 
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            display: inline-block;
            transition: var(--transition-slow);
        }

        .underline {
            width: 60px;
            height: 4px;
            background-color: var(--primary-red);
            margin: 0 auto;
        }

        /* Membros */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .member-card {
            background: var(--card-bg);
            padding: 40px 20px;
            text-align: center;
            border: 1px solid var(--accent-gray);
            transition: var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .member-card:hover {
            border-color: var(--primary-red);
            transform: translateY(-5px) scale(1.02);
            background: #110000;
        }

        .member-card i { font-size: 2.5rem; color: var(--primary-red); margin-bottom: 15px; }
        .rank { font-size: 0.75rem; color: var(--primary-red); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .member-card h3 { font-size: 1.4rem; letter-spacing: 1px; color: white; }

        /* Footer */
        footer { 
            padding: 80px 20px; 
            text-align: center; 
            background: #000; 
            border-top: 1px solid var(--accent-gray);
        }

        .social-icons { margin-top: 25px; display: flex; justify-content: center; gap: 20px; }
        .social-icons a { color: #888; font-size: 1.5rem; transition: var(--transition-fast); }
        .social-icons a:hover { color: var(--primary-red); transform: scale(1.1); }

        /* Media Queries */
        @media (max-width: 768px) {
            section { padding: 80px 5%; }
            .hero h1 { font-size: 3rem; }
            header { padding: 15px 5%; }
            header nav a { font-size: 0.7rem; margin-left: 15px; }
            .hero img { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Legião do Caos</div>
        <nav>
            <a href="#membros">ELITE</a>
            </nav>
    </header>

    <main>
        <section class="hero">
            <img src="logo.png" alt="Legião do Caos Logo" data-aos="zoom-in" data-aos-duration="1000">
            <h1 data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">CAOS E ORDEM</h1>
            <p data-aos="fade-up" data-aos-delay="400" data-aos-duration="1000">A força bruta que comanda o MadOut2.</p>
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank" class="btn-join" data-aos="fade-up" data-aos-delay="600" data-aos-duration="1000">
                <i class="fab fa-whatsapp"></i> FECHAR COM A GANGUE
            </a>
        </section>

        <section id="membros">
            <div class="section-title-container" data-aos="fade-left">
                <h2>Hierarquia de Elite</h2>
                <div class="underline"></div>
            </div>
            <div class="members-grid">
                <div class="member-card" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-crown"></i>
                    <div class="rank">Fundador / Admin</div>
                    <h3>Caua Madout2</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="200">
                    <i class="fas fa-skull"></i>
                    <div class="rank">Capitão de Guerra</div>
                    <h3>Reginaldo Brandão</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="300">
                    <i class="fas fa-user-shield"></i>
                    <div class="rank">Conselheiro</div>
                    <h3>Daniel Araujox</h3>
                </div>
                <div class="member-card" data-aos="fade-up" data-aos-delay="400">
                    <i class="fas fa-crosshairs"></i>
                    <div class="rank">Operacional</div>
                    <h3>[ 01 ]</h3>
                </div>
            </div>
        </section>

        </main>

    <footer data-aos="fade-up" data-aos-offset="50">
        <p style="font-weight: 900; letter-spacing: 2px;">LEGIÃO DO CAOS RP</p>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">MadOut2 Organização © 2026</p>
        <div class="social-icons">
            <a href="https://chat.whatsapp.com/HTb44FoVyyHK9xNKUTb3w1" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicializar AOS
        AOS.init({
            offset: 120, // Distância do scroll antes de iniciar
            duration: 800, // Duração da animação
            easing: 'ease-out-back', // Efeito de suavidade
            delay: 100, // Atraso inicial
            once: true, // Animará apenas uma vez (ao rolar para baixo)
        });

        // Lógica de Geração Automática de Galeria Removida

        // Smooth scroll para links da navegação
        document.querySelectorAll('header nav a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
